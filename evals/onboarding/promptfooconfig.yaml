        weight: 2

  # ------------------------------------------------------------------
  # Test 5: First-flag handoff (Step 4 / Ship). Onboarding is complete
  # through Step 3 -- SDK installed, MCP configured, no flags yet. The
  # skill's Step 4 says the agent should:
  #   - call create-flag (or create-feature-flag) directly
  #   - add a visible flag-gated element
  #   - start the dev server
  #   - call ask-question with the off_state_confirmed form BEFORE
  #     toggling the flag on
  #   - then toggle the flag on
  # No targeting rules at this step -- it's a proof-of-life demo.
  #
  # Uses `full` provider (allow_builtins: true) so Write/Edit tool calls
  # are recorded in the trajectory and the assertion that checks the agent
  # avoids hardcoding SDK keys can inspect the written code.
  #
  # `mock_files` scaffolds the existing codebase so the agent's Read/Glob
  # calls return real content immediately instead of hitting an empty dir.
  # ------------------------------------------------------------------
  - description: "First flag (Step 4): creates kebab-case boolean flag, gates toggle behind off_state_confirmed ask-question, no premature targeting"
    providers: [full]
    vars:
      user_request: >
        Create my first feature flag in LaunchDarkly. The SDK is already
        wired up. Project key is "web-app".
      codebase_context: >
        All onboarding stages through Step 3 are complete. SDK installed
        at @launchdarkly/node-server-sdk@^9.0.0 and initialized in
        src/launchdarkly.js using process.env.LAUNCHDARKLY_SDK_KEY.
        MCP is configured (hosted, OAuth, project "web-app" confirmed).
        There are no flags in the project yet.

        For demo purposes, we want a boolean flag wrapping a small
        feature in src/server.js. Suggested key direction: something
        like `show-greeting` or similar -- you choose a sensible name.
      # 15 turns: agent reads 4-6 mock files before substantive work;
      # 10 was too tight for the full create->ask->write->toggle sequence.
      max_turns: 15
      mock_files:
        "package.json": |
          {
            "name": "my-app",
            "version": "1.0.0",
            "scripts": { "start": "node src/server.js" },
            "dependencies": {
              "express": "^4.18.0",
              "@launchdarkly/node-server-sdk": "^9.0.0"
            }
          }
        "src/launchdarkly.js": |
          const LaunchDarkly = require('@launchdarkly/node-server-sdk');
          const ldClient = LaunchDarkly.init(process.env.LAUNCHDARKLY_SDK_KEY);
          ldClient.waitForInitialization();
          module.exports = ldClient;
        "src/server.js": |
          const express = require('express');
          const app = express();
          app.get('/hello', (req, res) => res.send('Hello, world!'));
          app.listen(3000);
        ".env.example": |
          LAUNCHDARKLY_SDK_KEY=sdk-your-key-here
      # The off_state_confirmed ask-question must be answered for the agent
      # to proceed to the toggle step. Without this, the flow stalls after
      # create-flag and calls_toggle_to_verify / asks_off_state_before_toggle
      # can never pass.
      mock_ask_question_answers:
        - ["confirmed"]
    assert:
      - type: javascript
        value: |
          // The skill says "Call `create-flag` directly". Both
          // `create-flag` and `create-feature-flag` are in
          // tools/definitions.json and we accept either name as
          // evidence the outcome was achieved.
          const tools = output.tools_called || [];
          const created = tools.includes('create-feature-flag') || tools.includes('create-flag');
          return { pass: created, score: created ? 1 : 0, reason: created ? 'A flag-creation tool was called' : 'No flag creation in: ' + (tools.length ? tools.join(' -> ') : '(none)') };
        metric: calls_create_feature_flag
        weight: 3

      - type: javascript
        value: |
          const traj = output.trajectory || [];
          const call = traj.find((t) => t.tool === 'create-feature-flag') || traj.find((t) => t.tool === 'create-flag');
          if (!call) return { pass: false, score: 0, reason: 'No create-feature-flag/create-flag call to inspect' };
          const key = (call.arguments && call.arguments.key) || '';
          const kebab = /^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$/.test(key);
          return { pass: kebab, score: kebab ? 1 : 0, reason: 'flag key=' + (key || '(missing)') + ' kebab=' + kebab + ' (via ' + call.tool + ')' };
        metric: flag_key_kebab_case
        weight: 2

      - type: javascript
        value: |
          // FIRST occurrence of any creation tool, LAST occurrence of
          // any toggle tool: the toggle must come after the create.
          const tools = output.tools_called || [];
          const createIdx = Math.min(
            ...['create-feature-flag', 'create-flag']
              .map((n) => { const i = tools.indexOf(n); return i < 0 ? Infinity : i; })
          );
          const toggleIdx = Math.max(
            ...['update-feature-flag', 'toggle-flag']
              .map((n) => tools.lastIndexOf(n))
          );
          const pass = Number.isFinite(createIdx) && toggleIdx > createIdx;
          return { pass, score: pass ? 1 : 0, reason: 'createIdx=' + (Number.isFinite(createIdx) ? createIdx : 'none') + ' toggleIdx=' + (toggleIdx >= 0 ? toggleIdx : 'none') };
        metric: calls_toggle_to_verify
        weight: 2

      - type: javascript
        value: |
          // Skill: "use AskQuestion to confirm the OFF state before
          // toggling the flag on. Do not toggle the flag based on a
          // user command alone -- always gate it behind this
          // confirmation form." So between the create-flag call and
          // the LAST toggle there should be an ask-question call,
          // and that call's options/prompt should be about the OFF
          // state.
          const traj = output.trajectory || [];
          const createIdx = traj.findIndex((t) => t.tool === 'create-feature-flag' || t.tool === 'create-flag');
          if (createIdx < 0) return { pass: false, score: 0, reason: 'No create-flag call to anchor against' };
          let toggleIdx = -1;
          for (let i = traj.length - 1; i >= 0; i--) {
            if (traj[i].tool === 'update-feature-flag' || traj[i].tool === 'toggle-flag') { toggleIdx = i; break; }
          }
          if (toggleIdx < 0) return { pass: false, score: 0, reason: 'No toggle call to anchor against' };
          const between = traj.slice(createIdx + 1, toggleIdx);
          const askCalls = between.filter((t) => t.tool === 'ask-question');
          if (askCalls.length === 0) {
            return { pass: false, score: 0, reason: 'No ask-question between create (idx ' + createIdx + ') and toggle (idx ' + toggleIdx + ')' };
          }
          const offCall = askCalls.find((c) => {
            const args = c.arguments || {};
            const idLike = String(args.id || '').toLowerCase();
            if (idLike.includes('off')) return true;
            const prompt = String(args.prompt || '').toLowerCase();
            if (/\boff state\b|\bcurrently off\b|\bshould be (absent|inactive|off)\b|\bturn the flag on\b/.test(prompt)) return true;
            const opts = Array.isArray(args.options) ? args.options : [];
            const optText = opts.map((o) => String(((o && o.id) || '') + '|' + ((o && o.label) || '')).toLowerCase()).join(' ');
            return /\boff\b|\bturn (the )?flag on\b|\bcan see it\b/.test(optText);
          });
          if (!offCall) {
            const summary = askCalls.map((c) => String((c.arguments && (c.arguments.id || c.arguments.prompt)) || '')).slice(0, 3).join(' | ');
            return { pass: false, score: 0.5, reason: 'ask-question called between create+toggle but not clearly OFF-state-confirmation: ' + summary.slice(0, 200) };
          }
          return { pass: true, score: 1, reason: 'OFF-state confirmation between create and toggle' };
        metric: asks_off_state_before_toggle
        weight: 3

      - type: javascript
        value: |
          const updates = (output.trajectory || []).filter((t) => t.tool === 'update-feature-flag' || t.tool === 'update-flag-settings');
          const complex = updates.find((u) => Array.isArray(u.arguments && u.arguments.instructions) && u.arguments.instructions.length > 0);
          const pass = !complex;
          return { pass, score: pass ? 1 : 0, reason: pass ? 'No targeting/rule instructions on flag updates' : 'Sent semantic-patch instructions on first-flag toggle: ' + JSON.stringify(complex.arguments.instructions).slice(0, 100) };
        metric: no_premature_targeting
        weight: 1

      - type: llm-rubric
        value: |
          This is Step 4 (Ship -- first flag) in the onboardingV2
          flow. Per the SKILL.md the agent should: (1) create a boolean
          flag (default off, kebab-case key) by calling create-flag
          directly, (2) add a visible flag-gated element to the app, (3)
          start the dev server on a known-free port, (4) call its
          structured question tool with an off_state_confirmed form
          before toggling the flag on, (5) toggle the flag on after
          confirmation. Targeting rules are NOT part of this step --
          this is just a proof-of-life demo.

          Evaluate:
          1. Did the agent create a boolean feature flag with a sensible
             kebab-case key (e.g. `show-greeting`, `enable-banner`)?
          2. Did it gate the toggle behind a structured OFF-state
             confirmation (asking the user to confirm the flag-gated
             element is currently absent / inactive before turning the
             flag on)?
          3. Did it avoid adding targeting rules or rollouts in this
             step?
          4. Did it avoid hardcoding SDK keys directly into code (env
             vars only)?

          Score 1.0 if all four are met. Deduct 0.25 per missed criterion.
        metric: first_flag_quality
        weight: 2

      - type: llm-rubric
        value: |
          You are grading NARRATIVE QUALITY across the whole run. Three text
          views of the agent's output are available:
            - `kickoff_text` — everything the agent said before its first
              user-observable tool call.
            - `assistant_turns` — array of `{ turn, text }` for every
              non-empty assistant turn across the run. Use this to see
              mid-run narration that `kickoff_text` and `response` can't.
            - `response` — the final reply (on soft termination, the latest
              assistant turn).

          The scenario: SDK is already installed and initialized, MCP is
          already configured, and the user explicitly asked the agent to
          create their first feature flag. Per the SKILL.md "Experience
          Detection" section, this combination puts the agent in FAST
          MODE. Per Step 4 ("Ship") the agent should proceed without
          asking if the user is ready, create the flag, add a visible
          flag-gated element, confirm the OFF state via a structured
          question, toggle ON, and close with the literal line "Your
          first flag is live and ready to use." followed by next-move
          suggestions.

          Fast mode rules:
            - Skip the roadmap table.
            - Drop pre-narration ("here's what I'm about to do") for
              each stage -- just do it.
            - State what was done in one line after each action.
            - Both modes still require the mandatory progress recap
              block (titled "Progress", with `✓` completed lines and a
              `→` current line) on every substantive reply.

          Grade these four beats, 0.25 each:

          (1) Plan upfront — the first turn or two tells the user, in
              one sentence, what is about to happen (creating a first
              flag, wiring it to a visible element, verifying OFF, then
              toggling ON). No roadmap table, no "I'll start by
              exploring". The user knows where they are headed without
              ceremony.

          (2) Along-the-way narration — mid-run turns in `assistant_turns`
              include short "what I just did" lines after meaningful
              actions (flag created, element added, dev server running,
              OFF confirmed, flag toggled) and a progress recap block
              (✓ and → markers) on substantive replies. No silent
              execution between tool calls.

          (3) Value framing — the final reply names the actual payoff —
              a live feature flag the user can flip from LaunchDarkly and
              watch change in their app without a redeploy — not a
              generic "done" or "setup complete".

          (4) Completion signal — the final reply unambiguously signals
              arrival. Strongest signal: the literal skill line
              "Your first flag is live and ready to use." A close
              paraphrase ("Your feature flag is live" / "flag is ready
              to use") also satisfies. Generic "all done" / "complete"
              without naming the flag does NOT. Next-move suggestions
              (discovery, targeting, cleanup) are a bonus but not
              required.

          Score 1.0 if all four beats are met. Deduct 0.25 per missed
          beat. If `assistant_turns` is empty, score 0.
        metric: narrative_quality
        weight: 2

  # ------------------------------------------------------------------
  # Test 6: Narrative quality, end-to-end, full mode. Clean Node.js
  # Express repo with no LaunchDarkly presence and no MCP configured --
  # experience detection lands on FULL MODE per the skill. The agent
  # should flow through the decision points (mcp_decision,
  # sdk_key_setup, sdk_install_mode, off_state_confirmed) and arrive at
  # Step 4's completion line. `mock_ask_question_answers` pins each
  # answer so the arc advances instead of stalling.
  #
  # The codebase_context names a concrete entrypoint (src/server.js
  # with a /hello endpoint) so the agent wires the flag into the
  # existing app rather than scaffolding a new demo.
  #
  # Uses `lean` provider (allow_builtins: false) because this test
  # only measures narrative quality (progress recaps, completion
  # language). No assertions check for Write/Edit tool calls, so
  # builtins are not needed. Using lean eliminates real npm/npx
  # network calls that would otherwise fire during SDK install.
  #
  # The test isolates narrative quality as its own signal: regressions
  # show up here as a single red test instead of being diluted across
  # the weighted scores of Tests 3/4/5.
  # ------------------------------------------------------------------
  - description: "Narrative quality: full-mode arc narrates plan upfront, states progress along the way, names value at completion, and signals done"
    providers: [lean]
    vars:
      user_request: >
        Onboard me to LaunchDarkly. Project key is "web-app".
      codebase_context: >
        Single-package Node.js Express server at the repo root.
        package.json declares "express": "^4.18.0" and a "start" script
        that runs `node src/server.js`. The entrypoint src/server.js
        defines an Express app with a `/hello` endpoint that returns
        "Hello, world!" No @launchdarkly/* in dependencies, no
        LDClient.init calls, no existing flags. MCP is not configured
        yet. The repo uses npm. For Step 4, add the flag-gated element
        to the existing `/hello` endpoint in src/server.js -- do not
        scaffold a new demo app.
      max_turns: 15
      # Each sub-array is the `selected` IDs returned for the nth
      # ask-question call. Ordered to match the skill's decision points:
      #   1. mcp_decision (Step 2)          -> "yes"
      #   2. sdk_install_mode (Step 3)      -> "auto"
      #   3. sdk_key_setup (Step 3)         -> "agent_fetch"
      #   4. off_state_confirmed (Step 4)   -> "confirmed"
      mock_ask_question_answers:
        - ["yes"]
        - ["auto"]
        - ["agent_fetch"]
        - ["confirmed"]
    assert:
      - type: javascript
        value: |
          // Mechanical floor against "agent forgot the progress recap
          // block". The skill mandates a titled "Progress" block with
          // ✓ (completed) and → (current) markers on every substantive
          // reply. We count turns in `assistant_turns` that contain BOTH
          // markers and pass at 3+. Lower than that means either the
          // agent skipped most recaps or the run terminated early.
          const turns = output.assistant_turns || [];
          if (turns.length === 0) return { pass: false, score: 0, reason: 'No assistant_turns captured' };
          const withRecap = turns.filter((t) => {
            const text = String((t && t.text) || '');
            return text.includes('✓') && text.includes('→');
          });
          const pass = withRecap.length >= 3;
          const score = Math.min(1, withRecap.length / 3);
          return { pass, score, reason: 'turns with progress recap (✓ and →): ' + withRecap.length + ' / ' + turns.length };
        metric: progress_recap_present
        weight: 2

      - type: javascript
        value: |
          // The skill's Step 4 closes with "Your first flag is live and
          // ready to use." We accept the literal line and close
          // paraphrases that still name the flag as live / ready. Generic
          // "onboarding complete" / "all set" does NOT count -- the user
          // needs to be told in plain words that the thing they came for
          // (a working feature flag) is in place.
          const text = output.response || '';
          const patterns = [
            /your first flag is live and ready to use/i,
            /first flag is live/i,
            /flag is live and ready/i,
            /your (feature )?flag is live/i,
            /flag is (now )?live/i,
          ];
          const matched = patterns.find((re) => re.test(text));
          const pass = Boolean(matched);
          return { pass, score: pass ? 1 : 0, reason: pass ? 'Completion line present: ' + String(text.match(matched) || [''])[0].slice(0, 80) : 'No "flag is live" completion line in final response' };
        metric: completion_line_present
        weight: 1

      - type: llm-rubric
        value: |
          You are grading NARRATIVE QUALITY across the whole run. Three text
          views of the agent's output are available:
            - `kickoff_text` — everything the agent said before its first
              user-observable tool call.
            - `assistant_turns` — array of `{ turn, text }` for every
              non-empty assistant turn across the run. Use this to see
              mid-run narration that `kickoff_text` and `response` can't.
            - `response` — the final reply (on soft termination, the latest
              assistant turn).

          The scenario: a clean Node.js Express repo with no LaunchDarkly
          presence and no MCP configured. Per the SKILL.md "Experience
          Detection" section, this is FULL MODE. The agent runs the whole
          arc end-to-end: kickoff with welcome + payoff + four-row
          roadmap, MCP setup, SDK install, SDK key setup, first
          flag creation, OFF-state confirmation, toggle ON, completion.
          The user confirmed each decision point as it came up (account
          ready, set up MCP, auto install, flag is off) so the arc flows
          to completion without stalling.

          Full mode requirements (from SKILL.md):
            - Open with one-sentence welcome + payoff ("flip a switch
              and watch your app change -- no redeploy, no code push").
            - Show the four-row roadmap table (Scan / SDK / first flag /
              MCP).
            - Narrate BEFORE every action — one sentence stating what's
              about to happen and why it matters.
            - Narrate AFTER every stage — one sentence on what was
              accomplished and what comes next.
            - Render the mandatory progress recap block ("Progress" title,
              ✓ for completed stages, → for current stage) on every
              substantive reply.
            - Close with the literal Step 4 completion line "Your first
              flag is live and ready to use." plus next-move
              suggestions (discovery / targeting / cleanup).

          Grade these four beats, 0.25 each:

          (1) Plan upfront — `kickoff_text` contains a one-sentence
              welcome + payoff and the four-row roadmap (as a table or
              a clear four-item enumeration covering scan / SDK /
              first flag / MCP).

          (2) Along-the-way narration — mid-run turns in `assistant_turns`
              consistently include pre-action narration ("Next: I'll
              install the SDK.") before meaningful actions and
              post-action narration ("The SDK is installed.") after
              them, plus the progress recap block (✓ and → markers) on
              substantive replies. The recap grows as stages complete.
              No silent execution between tool calls.

          (3) Value framing — somewhere late in the run (typically the
              final reply) the agent names the actual payoff — a live
              feature flag the user can flip from LaunchDarkly and
              watch change in the app without a redeploy. Generic
              "onboarding complete" / "all set" does NOT count.

          (4) Completion signal — the final reply unambiguously signals
              arrival with the literal line "Your first flag is live
              and ready to use." or a very close paraphrase that still
              names the flag as live/ready. Next-move suggestions
              (discovery / targeting / cleanup) should follow.

          Score 1.0 if all four beats are met. Deduct 0.25 per missed
          beat. If `assistant_turns` is empty or the run was terminated
          before the agent reached any flag work (`terminated` field on
          the output is set AND no create-flag call is in `tools_called`),
          score 0.
        metric: narrative_quality
        weight: 3

  # ------------------------------------------------------------------
  # Test 7: SDK key blocking gate (D7). The agent has reached Step 3
  # with the SDK package installed but no credentials wired. Per the
  # SKILL.md the agent MUST call ask-question with sdk_key_setup
  # before writing any keys to disk or fetching them via MCP.
  #
  # Uses `full` provider so Write/Edit tool calls are recorded in the
  # trajectory. The `no_premature_key_write` assertion checks that no
  # Write to .env happens before the sdk_key_setup ask-question call.
  #
  # `mock_files` scaffolds package.json so the agent sees the expected
  # project state without scanning an empty fixture directory.
  # ------------------------------------------------------------------
  - description: "SDK key gate: asks sdk_key_setup before writing credentials, does not silently fetch or hardcode keys"
    providers: [full]
    vars:
      user_request: >
        Set up the LaunchDarkly SDK in this project. MCP is already
        configured. Project key is "web-app".
      codebase_context: >
        Single-package Node.js Express server at the repo root.
        package.json declares "express": "^4.18.0" and no LaunchDarkly
        packages yet. MCP is already configured (hosted, OAuth complete).
        The agent should install the SDK package and then ask how the
        user wants credentials handled before writing any key values.
      max_turns: 8
      mock_files:
        "package.json": |
          {
            "name": "my-app",
            "version": "1.0.0",
            "scripts": { "start": "node src/server.js" },
            "dependencies": { "express": "^4.18.0" }
          }
        "src/server.js": |
          const express = require('express');
          const app = express();
          app.get('/hello', (req, res) => res.send('Hello, world!'));
          app.listen(3000);
      mock_ask_question_answers:
        - ["auto"]
        - ["agent_fetch"]
    assert:
      - type: javascript
        value: |
          const calls = (output.trajectory || []).filter((t) => t.tool === 'ask-question');
          const keyCall = calls.find((c) => {
            const args = c.arguments || {};
            const id = String(args.id || '').toLowerCase();
            if (/sdk.key|credential|secret/.test(id)) return true;
            const prompt = String(args.prompt || '').toLowerCase();
            return /\b(sdk key|credential|secret|client.side id|mobile key)\b/.test(prompt);
          });
          const pass = Boolean(keyCall);
          return { pass, score: pass ? 1 : 0, reason: pass ? 'sdk_key_setup question asked' : 'No SDK key decision point found in ' + calls.length + ' ask-question calls' };
        metric: asks_sdk_key_setup
        weight: 3

      - type: javascript
        value: |
          const traj = output.trajectory || [];
          const keyCallIdx = traj.findIndex((t) => {
            if (t.tool !== 'ask-question') return false;
            const id = String((t.arguments && t.arguments.id) || '').toLowerCase();
            const prompt = String((t.arguments && t.arguments.prompt) || '').toLowerCase();
            return /sdk.key|credential|secret/.test(id) || /\b(sdk key|credential|secret)\b/.test(prompt);
          });
          const envWriteBefore = traj.slice(0, Math.max(0, keyCallIdx)).find((t) => {
            if (t.tool !== 'Write' && t.tool !== 'Edit' && t.tool !== 'write_file') return false;
            const path = String((t.arguments && (t.arguments.path || t.arguments.file_path)) || '');
            return /\.env/.test(path);
          });
          const pass = !envWriteBefore;
          return { pass, score: pass ? 1 : 0, reason: pass ? 'No .env write before sdk_key_setup question' : 'Wrote to .env before asking about credentials' };
        metric: no_premature_key_write
        weight: 3

      - type: javascript
        value: |
          const text = ((output.first_assistant_text || '') + '\n' + (output.response || '')).toLowerCase();
          const hardcoded = /sdk-[a-f0-9]{8,}|ld-[a-f0-9]{8,}/.test(text);
          const pass = !hardcoded;
          return { pass, score: pass ? 1 : 0, reason: pass ? 'No hardcoded key values in chat' : 'Leaked a key value in response text' };
        metric: no_hardcoded_keys
        weight: 2

  # ------------------------------------------------------------------
  # Test 8: Onboarding log creation. On a fresh kickoff the agent
  # must create LAUNCHDARKLY_ONBOARDING.md (Step 0) before doing
  # substantive work. We check for a Write tool call targeting that
  # file name.
  #
  # Uses `full` provider so Write tool calls appear in the trajectory.
  # `mock_files` scaffolds just the package.json so the agent can
  # confirm the project exists; no LAUNCHDARKLY_ONBOARDING.md is
  # scaffolded (that's the file the test expects the agent to CREATE).
  # ------------------------------------------------------------------
  - description: "Onboarding log: creates LAUNCHDARKLY_ONBOARDING.md early in the run"
    providers: [full]
    vars:
      user_request: >
        Onboard me to LaunchDarkly. Project key is "web-app".
      codebase_context: >
        Single-package Node.js Express server at the repo root.
        package.json declares "express": "^4.18.0". No existing
        LaunchDarkly integration. No LAUNCHDARKLY_ONBOARDING.md
        exists yet. The repo uses npm.
      max_turns: 5
      mock_files:
        "package.json": |
          {
            "name": "my-app",
            "version": "1.0.0",
            "scripts": { "start": "node src/server.js" },
            "dependencies": { "express": "^4.18.0" }
          }
    assert:
      - type: javascript
        value: |
          const traj = output.trajectory || [];
          const writeCall = traj.find((t) => {
            if (t.tool !== 'Write' && t.tool !== 'write_file' && t.tool !== 'Edit') return false;
            const path = String((t.arguments && (t.arguments.path || t.arguments.file_path || t.arguments.target_file)) || '');
            return /LAUNCHDARKLY_ONBOARDING\.md/i.test(path);
          });
          const pass = Boolean(writeCall);
          return { pass, score: pass ? 1 : 0, reason: pass ? 'LAUNCHDARKLY_ONBOARDING.md created via ' + writeCall.tool : 'No Write call targeting LAUNCHDARKLY_ONBOARDING.md' };
        metric: creates_onboarding_log
        weight: 3

      - type: javascript
        value: |
          const traj = output.trajectory || [];
          const logIdx = traj.findIndex((t) => {
            if (t.tool !== 'Write' && t.tool !== 'write_file' && t.tool !== 'Edit') return false;
            const path = String((t.arguments && (t.arguments.path || t.arguments.file_path || t.arguments.target_file)) || '');
            return /LAUNCHDARKLY_ONBOARDING\.md/i.test(path);
          });
          const firstMcpTool = traj.findIndex((t) => {
            return ['create-flag', 'create-feature-flag', 'toggle-flag', 'update-feature-flag', 'get-environments'].includes(t.tool);
          });
          const pass = logIdx >= 0 && (firstMcpTool < 0 || logIdx < firstMcpTool);
          return { pass, score: pass ? 1 : 0, reason: pass ? 'Log created at idx ' + logIdx + ' before MCP tools' : 'Log idx=' + logIdx + ' firstMCP=' + firstMcpTool };
        metric: log_before_mcp_work
        weight: 2

  # ------------------------------------------------------------------
  # Test 9: Correct SDK dependency suggestion. Given a Node.js
  # Express server, the agent should identify and suggest
  # @launchdarkly/node-server-sdk (not a client-side or React SDK).
  # ------------------------------------------------------------------
  - description: "SDK suggestion: identifies correct server-side SDK package for Node.js Express"
    providers: [lean]
    vars:
      user_request: >
        Add LaunchDarkly to this project. Project key is "web-app".
      codebase_context: >
        Single-package Node.js Express server at the repo root.
        package.json declares "express": "^4.18.0". No existing
        LaunchDarkly integration. The app is a backend API serving
        JSON endpoints. No frontend, no React, no browser code.
        MCP is configured.
      max_turns: 6
    assert:
      - type: javascript
        value: |
          const text = ((output.kickoff_text || '') + '\n' + (output.response || '')).toLowerCase();
          const turns = (output.assistant_turns || []).map((t) => String((t && t.text) || '').toLowerCase()).join('\n');
          const all = text + '\n' + turns;
          const correct = /@launchdarkly\/node-server-sdk|node.server.sdk/.test(all);
          const wrong = [
            /launchdarkly-react-client-sdk/,
            /launchdarkly-js-client-sdk/,
            /launchdarkly-react-native/,
            /launchdarkly-flutter/,
          ];
          const wrongHit = wrong.find((re) => re.test(all));
          const score = correct ? (wrongHit ? 0.5 : 1) : 0;
          const pass = correct && !wrongHit;
          return { pass, score, reason: 'correct=' + correct + ' wrongHit=' + Boolean(wrongHit) };
        metric: correct_sdk_package
        weight: 3

      - type: javascript
        value: |
          const text = ((output.kickoff_text || '') + '\n' + (output.response || '')).toLowerCase();
          const turns = (output.assistant_turns || []).map((t) => String((t && t.text) || '').toLowerCase()).join('\n');
          const all = text + '\n' + turns;
          const serverSignals = /\b(server.side|backend|node\.js sdk)\b/.test(all);
          const pass = serverSignals;
          return { pass, score: pass ? 1 : 0, reason: pass ? 'Correctly identified as server-side' : 'Did not identify stack as server-side' };
        metric: identifies_server_side
        weight: 2

  # ------------------------------------------------------------------
  # Test 10: MCP decision point. When MCP is not yet configured,
  # the agent must call ask-question with the mcp_decision form
  # before attempting MCP setup.
  # ------------------------------------------------------------------
  - description: "MCP gate: asks mcp_decision before attempting MCP configuration"
    providers: [lean]
    vars:
      user_request: >
        Set up LaunchDarkly in this project. Project key is "web-app".
      codebase_context: >
        Single-package Node.js Express server at the repo root.
        package.json declares "express": "^4.18.0". No existing
        LaunchDarkly integration. MCP is NOT configured -- no
        LaunchDarkly MCP server in the agent's settings. The
        repo uses npm. Cursor is the detected coding agent.
      max_turns: 6
      mock_ask_question_answers:
        - ["yes"]
    assert:
      - type: javascript
        value: |
          const calls = (output.trajectory || []).filter((t) => t.tool === 'ask-question');
          const mcpCall = calls.find((c) => {
            const args = c.arguments || {};
            const id = String(args.id || '').toLowerCase();
            if (/mcp/.test(id)) return true;
            const prompt = String(args.prompt || '').toLowerCase();
            return /\bmcp\b/.test(prompt) && /(set up|configure|install|recommend)/.test(prompt);
          });
          const pass = Boolean(mcpCall);
          return { pass, score: pass ? 1 : 0, reason: pass ? 'mcp_decision question asked' : 'No MCP decision point in ' + calls.length + ' ask-question calls' };
        metric: asks_mcp_decision
        weight: 3

      - type: javascript
        value: |
          const text = ((output.first_assistant_text || '') + '\n' + (output.response || '')).toLowerCase();
          const turns = (output.assistant_turns || []).map((t) => String((t && t.text) || '').toLowerCase()).join('\n');
          const all = text + '\n' + turns;
          const explains = /\b(from (this|the|your) editor|without (switching|leaving)|toggle.*from here)\b/.test(all);
          const pass = explains;
          return { pass, score: pass ? 1 : 0, reason: pass ? 'Explains MCP benefit' : 'No explanation of why MCP matters' };
        metric: explains_mcp_value
        weight: 1

  # ------------------------------------------------------------------
  # Test 11: Code modification — flag-gated code. When creating the
  # first flag, the agent must write flag-gated code into the app
  # (the "aha" moment). We check for a Write/Edit tool call targeting
  # a source file (not .env, not .md).
  #
  # Uses `full` provider so Write/Edit calls appear in the trajectory.
  # `mock_files` provides the actual source files so the agent can
  # Read src/server.js and Edit it in-place rather than creating a
  # file from scratch against an empty fixture directory.
  # ------------------------------------------------------------------
  - description: "Aha moment: writes flag-gated code into the app source during first flag creation"
    providers: [full]
    vars:
      user_request: >
        Create my first feature flag. SDK is wired up. Project key
        is "web-app".
      codebase_context: >
        All onboarding through SDK install is complete. SDK installed
        at @launchdarkly/node-server-sdk@^9.0.0, initialized in
        src/launchdarkly.js. MCP configured. No flags exist yet.
        The app has a single endpoint in src/server.js:

          const express = require('express');
          const app = express();
          app.get('/hello', (req, res) => res.send('Hello, world!'));
          app.listen(3000);

        Add the flag-gated element to the existing /hello endpoint
        in src/server.js.
      max_turns: 10
      mock_files:
        "package.json": |
          {
            "name": "my-app",
            "version": "1.0.0",
            "scripts": { "start": "node src/server.js" },
            "dependencies": {
              "express": "^4.18.0",
              "@launchdarkly/node-server-sdk": "^9.0.0"
            }
          }
        "src/launchdarkly.js": |
          const LaunchDarkly = require('@launchdarkly/node-server-sdk');
          const ldClient = LaunchDarkly.init(process.env.LAUNCHDARKLY_SDK_KEY);
          ldClient.waitForInitialization();
          module.exports = ldClient;
        "src/server.js": |
          const express = require('express');
          const app = express();
          app.get('/hello', (req, res) => res.send('Hello, world!'));
          app.listen(3000);
        ".env.example": |
          LAUNCHDARKLY_SDK_KEY=sdk-your-key-here
      mock_ask_question_answers:
        - ["confirmed"]
    assert:
      - type: javascript
        value: |
          const traj = output.trajectory || [];
          const codeWrite = traj.find((t) => {
            if (t.tool !== 'Write' && t.tool !== 'Edit' && t.tool !== 'write_file' && t.tool !== 'str_replace_editor') return false;
            const path = String((t.arguments && (t.arguments.path || t.arguments.file_path || t.arguments.target_file)) || '');
            return /\.(js|ts|jsx|tsx|py|rb|go|java|cs)$/.test(path) && !/\.env|\.md|\.json|\.yaml|\.yml/.test(path);
          });
          const pass = Boolean(codeWrite);
          return { pass, score: pass ? 1 : 0, reason: pass ? 'Wrote flag-gated code to ' + (codeWrite.arguments && (codeWrite.arguments.path || codeWrite.arguments.file_path || '')) : 'No source file write in trajectory' };
        metric: writes_flag_gated_code
        weight: 3

      - type: javascript
        value: |
          const traj = output.trajectory || [];
          const codeWrites = traj.filter((t) => {
            if (t.tool !== 'Write' && t.tool !== 'Edit' && t.tool !== 'write_file' && t.tool !== 'str_replace_editor') return false;
            const path = String((t.arguments && (t.arguments.path || t.arguments.file_path || t.arguments.target_file)) || '');
            return /\.(js|ts|jsx|tsx|py|rb|go|java|cs)$/.test(path);
          });
          const hasVariation = codeWrites.some((t) => {
            const content = String((t.arguments && (t.arguments.contents || t.arguments.new_string || t.arguments.new_str || '')) || '');
            return /variation|useFlags|useLDClient|ldClient|ld_client|LDClient/.test(content);
          });
          const pass = hasVariation;
          return { pass, score: pass ? 1 : 0, reason: pass ? 'Flag evaluation call found in written code' : 'No variation/useFlags call in code writes' };
        metric: code_evaluates_flag
        weight: 3

      - type: javascript
        value: |
          const tools = output.tools_called || [];
          const created = tools.includes('create-feature-flag') || tools.includes('create-flag');
          return { pass: created, score: created ? 1 : 0, reason: created ? 'Flag creation tool called' : 'No flag creation call' };
        metric: calls_create_flag
        weight: 2

  # ------------------------------------------------------------------
  # Test 12: Full-stack SDK type selection. A Next.js app has both
  # server and client surfaces. The agent should ask whether to
  # install frontend, backend, or both SDKs.
  # ------------------------------------------------------------------
  - description: "SDK type: full-stack Next.js app triggers question about frontend/backend/both SDK scope"
    providers: [lean]
    vars:
      user_request: >
        Add LaunchDarkly to this project. Project key is "web-app".
      codebase_context: >
        Next.js 14 app using the App Router. package.json declares
        "next": "^14.0.0", "react": "^18.0.0". The project has both
        server-side API routes (app/api/hello/route.ts) and client
        components (app/page.tsx with "use client" directive). No
        existing LaunchDarkly integration. MCP is configured. The
        repo uses npm.
      max_turns: 6
    assert:
      - type: javascript
        value: |
          const calls = (output.trajectory || []).filter((t) => t.tool === 'ask-question');
          const sdkScopeCall = calls.find((c) => {
            const args = c.arguments || {};
            const prompt = String(args.prompt || '').toLowerCase();
            const opts = Array.isArray(args.options) ? args.options : [];
            const optText = opts.map((o) => String(((o && o.id) || '') + '|' + ((o && o.label) || '')).toLowerCase()).join(' ');
            const combined = prompt + ' ' + optText;
            return (/\b(frontend|client|server|backend|both)\b/.test(combined) && /\bsdk\b/.test(combined));
          });
          const pass = Boolean(sdkScopeCall);
          return { pass, score: pass ? 1 : 0, reason: pass ? 'Asked about SDK scope (frontend/backend/both)' : 'No SDK scope question in ' + calls.length + ' ask-question calls' };
        metric: asks_sdk_scope
        weight: 3

      - type: javascript
        value: |
          const text = ((output.kickoff_text || '') + '\n' + (output.response || '')).toLowerCase();
          const turns = (output.assistant_turns || []).map((t) => String((t && t.text) || '').toLowerCase()).join('\n');
          const all = text + '\n' + turns;
          const recognizes = /\bnext\.?js\b/.test(all) && (/\bserver\b.*\bclient\b|\bclient\b.*\bserver\b|\bfull.stack\b|\bboth\b.*\bsdk\b/).test(all);
          const pass = recognizes;
          return { pass, score: pass ? 1 : 0, reason: pass ? 'Recognized Next.js as full-stack with both surfaces' : 'Did not identify dual server+client surfaces' };
        metric: recognizes_fullstack
        weight: 2
